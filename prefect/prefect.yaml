prefect-version: 3.0.0

deployments:
  - name: marketing-analytics-client1
    work_pool:
      name: docker-pool
    flow_location: ./prefect/flows/marketing_pipeline.py
    entrypoint: prefect/flows/marketing_pipeline.py:marketing_analytics_pipeline
    parameters:
      client_id: client1
      sources:
        - ga4
        - gads
        - fbads
        - prestashop
    schedule:
      cron: 0 1 * * *
      timezone: Europe/Prague
    tags:
      - marketing
      - etl
      - client1
