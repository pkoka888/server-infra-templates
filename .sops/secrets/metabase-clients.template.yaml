# SOPS Secrets Template - Metabase
# Copy this file, fill in values, then encrypt:
#   sops -e -i secrets/metabase-clients.enc.yaml

# Client 1 - Example
client1:
  # PrestaShop
  PS_SHOP_URL: "https://mystore.com"
  PS_API_KEY: "your_prestashop_api_key"
  
  # Google Analytics 4
  GA4_PROPERTY_ID: "123456789"
  GA4_CLIENT_ID: "xxxx.apps.googleusercontent.com"
  GA4_CLIENT_SECRET: ""
  GA4_REFRESH_TOKEN: ""
  GA4_PROJECT_ID: "my-project-12345"
  
  # Google Ads
  GADS_CUSTOMER_ID: "1234567890"
  GADS_DEVELOPER_TOKEN: ""
  GADS_CLIENT_ID: ""
  GADS_CLIENT_SECRET: ""
  GADS_REFRESH_TOKEN: ""
  
  # Facebook Ads
  FB_AD_ACCOUNT_ID: "act_123456789"
  FB_ACCESS_TOKEN: ""

# Client 2 - Another example
client2:
  PS_SHOP_URL: "https://another-store.com"
  PS_API_KEY: "another_api_key"
  # ... add more clients as needed