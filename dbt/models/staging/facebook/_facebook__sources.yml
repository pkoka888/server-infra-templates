version: 2

sources:
  - name: facebook_raw
    database: metabase
    schema: "fbads_{{ var('client_id') }}"
    freshness:
      warn_after: {count: 12, period: hour}
      error_after: {count: 24, period: hour}
    loaded_at_field: "_dlt_load_time"

    tables:
      - name: ads
        description: "Facebook ads data from dlt pipeline with quality validations"
        freshness:
          warn_after: {count: 12, period: hour}
          error_after: {count: 24, period: hour}
        loaded_at_field: "_dlt_load_time"
        columns:
          - name: ad_id
            description: "Unique Facebook ad identifier - must be unique and not null"
            tests:
              - unique:
                  severity: error
              - not_null:
                  severity: error

          - name: ad_name
            description: "Name of the ad"

          - name: spend
            description: "Amount spent on the ad - must be non-negative"
            tests:
              - dbt_expectations.expect_column_values_to_be_between:
                  min_value: 0
                  row_condition: "spend IS NOT NULL"
                  strictly: false
                  severity: error

          - name: impressions
            description: "Number of impressions - must be non-negative"
            tests:
              - dbt_expectations.expect_column_values_to_be_between:
                  min_value: 0
                  row_condition: "impressions IS NOT NULL"
                  strictly: false
                  severity: warn

          - name: clicks
            description: "Number of clicks - must be non-negative"
            tests:
              - dbt_expectations.expect_column_values_to_be_between:
                  min_value: 0
                  row_condition: "clicks IS NOT NULL"
                  strictly: false
                  severity: warn

          - name: date
            description: "Date of the ad data"
            tests:
              - not_null:
                  severity: error

      - name: campaigns
        description: "Facebook campaigns data from dlt pipeline"
        columns:
          - name: campaign_id
            description: "Unique campaign identifier"
            tests:
              - unique
              - not_null

          - name: campaign_name
            description: "Name of the campaign"
            tests:
              - not_null
