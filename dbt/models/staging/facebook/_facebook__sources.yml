version: 2

sources:
  - name: facebook_raw
    database: metabase
    schema: "fbads_{{ var('client_id') }}"
    loaded_at_field: "_dlt_load_time"

    tables:
      - name: ads
        description: "Facebook ads data from dlt pipeline"
        loaded_at_field: "_dlt_load_time"
        columns:
          - name: ad_id
            description: "Unique Facebook ad identifier"
            tests:
              - unique
              - not_null

          - name: ad_name
            description: "Name of the ad"

          - name: spend
            description: "Amount spent on the ad"
            tests:
              - dbt_expectations.expect_column_values_to_be_between:
                  arguments:
                    min_value: 0
                  config:
                    severity: warn

          - name: impressions
            description: "Number of impressions"
            tests:
              - dbt_expectations.expect_column_values_to_be_between:
                  arguments:
                    min_value: 0
                  config:
                    severity: warn

          - name: clicks
            description: "Number of clicks"
            tests:
              - dbt_expectations.expect_column_values_to_be_between:
                  arguments:
                    min_value: 0
                  config:
                    severity: warn

          - name: date
            description: "Date of the ad data"
            tests:
              - not_null

      - name: campaigns
        description: "Facebook campaigns data from dlt pipeline"
        columns:
          - name: campaign_id
            description: "Unique campaign identifier"
            tests:
              - unique
              - not_null

          - name: campaign_name
            description: "Name of the campaign"
            tests:
              - not_null
