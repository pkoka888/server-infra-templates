version: 2

models:
  - name: stg_facebook__ads
    description: "Staging model for Facebook ads with data quality validations"
    columns:
      - name: ad_id
        description: "Unique Facebook ad identifier - must be unique and not null"
        tests:
          - unique:
              severity: error
          - not_null:
              severity: error

      - name: ad_name
        description: "Name of the ad"

      - name: campaign_id
        description: "Foreign key to campaigns"
        tests:
          - not_null:
              severity: warn
          - relationships:
              to: source('facebook_raw', 'campaigns')
              field: campaign_id
              severity: warn

      - name: date
        description: "Date of the ad data - must not be null"
        tests:
          - not_null:
              severity: error

      - name: spend
        description: "Amount spent on the ad - must be non-negative"
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              row_condition: "spend IS NOT NULL"
              strictly: false
              severity: error

      - name: impressions
        description: "Number of impressions - must be non-negative"
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              row_condition: "impressions IS NOT NULL"
              strictly: false
              severity: warn

      - name: clicks
        description: "Number of clicks - must be non-negative and <= impressions"
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              row_condition: "clicks IS NOT NULL"
              strictly: false
              severity: warn
          - dbt_expectations.expect_column_pair_values_A_to_be_greater_than_B:
              column_A: impressions
              column_B: clicks
              or_equal: true
              row_condition: "clicks IS NOT NULL AND impressions IS NOT NULL"
              severity: warn

      - name: ctr
        description: "Click-through rate - must be between 0 and 1"
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 1
              row_condition: "ctr IS NOT NULL"
              strictly: false
              severity: warn

      - name: cpc
        description: "Cost per click - must be non-negative"
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              row_condition: "cpc IS NOT NULL"
              strictly: false
              severity: warn

      - name: conversions
        description: "Number of conversions - must be non-negative"
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              row_condition: "conversions IS NOT NULL"
              strictly: false
              severity: warn

      - name: cost_per_conversion
        description: "Cost per conversion - must be non-negative"
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              row_condition: "cost_per_conversion IS NOT NULL"
              strictly: false
              severity: warn

  - name: stg_facebook__campaigns
    description: "Staging model for Facebook campaigns"
    columns:
      - name: campaign_id
        description: "Unique campaign identifier - must be unique and not null"
        tests:
          - unique:
              severity: error
          - not_null:
              severity: error

      - name: campaign_name
        description: "Name of the campaign - must not be null"
        tests:
          - not_null:
              severity: error

      - name: status
        description: "Campaign status"
        tests:
          - dbt_expectations.expect_column_values_to_be_in_set:
              value_set: ['ACTIVE', 'PAUSED', 'DELETED', 'ARCHIVED']
              quote_values: true
              severity: warn
