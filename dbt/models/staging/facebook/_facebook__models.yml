version: 2

models:
  - name: stg_facebook__ads
    description: "Staging model for Facebook ads"
    columns:
      - name: ad_id
        description: "Unique Facebook ad identifier"
        tests:
          - unique
          - not_null

      - name: ad_name
        description: "Name of the ad"

      - name: campaign_id
        description: "Foreign key to campaigns"
        tests:
          - not_null

      - name: date
        description: "Date of the ad data"
        tests:
          - not_null

      - name: spend
        description: "Amount spent on the ad"
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
              config:
                severity: warn

      - name: impressions
        description: "Number of impressions"
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
              config:
                severity: warn

      - name: clicks
        description: "Number of clicks"
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
              config:
                severity: warn

  - name: stg_facebook__campaigns
    description: "Staging model for Facebook campaigns"
    columns:
      - name: campaign_id
        description: "Unique campaign identifier"
        tests:
          - unique
          - not_null

      - name: campaign_name
        description: "Name of the campaign"
        tests:
          - not_null
