version: 2

sources:
  - name: ga4_raw
    database: metabase
    schema: "ga4_{{ var('client_id') }}"
    loaded_at_field: "_dlt_load_time"

    tables:
      - name: traffic
        description: "GA4 traffic data from dlt pipeline"
        loaded_at_field: "_dlt_load_time"

      - name: events
        description: "GA4 events data from dlt pipeline"
        loaded_at_field: "_dlt_load_time"
