version: 2

models:
  - name: stg_prestashop__orders
    description: "Staging model for PrestaShop orders"
    columns:
      - name: order_id
        description: "Primary key for orders"
        tests:
          - unique
          - not_null

      - name: customer_id
        description: "Foreign key to customers"
        tests:
          - not_null

      - name: total_paid
        description: "Total amount paid including shipping"
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
              config:
                severity: warn

      - name: created_at
        description: "Order creation timestamp"
        tests:
          - not_null

      - name: status_id
        description: "Order status ID"
