version: 2

models:
  - name: fct_marketing_performance
    description: |
      Unified marketing performance fact table combining data from GA4,
      Facebook Ads, and PrestaShop. Provides daily aggregated metrics
      by channel, source, medium, and campaign.

      ## Key Metrics
      - Sessions: Traffic volume from GA4
      - Impressions: Ad impressions from Facebook Ads
      - Clicks: Click-through from all channels
      - Conversions: Goal completions / purchases
      - Revenue: Total revenue attributed
      - Cost: Ad spend (where available)
      - ROAS: Return on ad spend
      - CPA: Cost per acquisition
      - CTR: Click-through rate
      - CPC: Cost per click
      - Conversion Rate: Conversions / Sessions

      ## Attribution Logic
      - GA4: Session-based traffic metrics
      - Facebook Ads: Platform-native conversion tracking
      - PrestaShop: Order revenue with UTM attribution
    
    config:
      materialized: table
      schema: marts
      tags: ['marketing', 'fact', 'core']

    columns:
      - name: performance_sk
        description: Surrogate key combining date, source, medium, and campaign
        tests:
          - not_null
          - unique

      - name: date_day
        description: Date of the performance record
        tests:
          - not_null

      - name: channel_grouping
        description: |
          Standardized channel grouping:
          - organic_search: SEO traffic
          - paid_search: Google Ads
          - paid_social: Facebook/Instagram Ads
          - email: Email marketing
          - direct: Direct traffic
          - ecommerce: PrestaShop orders
        tests:
          - not_null
          - accepted_values:
              values: ['organic_search', 'paid_search', 'paid_social', 
                      'email', 'direct', 'ecommerce', 'referral', 'display']

      - name: source
        description: Traffic source (e.g., google, facebook, prestashop, direct)
        tests:
          - not_null

      - name: medium
        description: Marketing medium (e.g., organic, cpc, email, none)
        tests:
          - not_null

      - name: data_source
        description: Originating data system (GA4, Facebook Ads, PrestaShop)
        tests:
          - not_null
          - accepted_values:
              values: ['GA4', 'Facebook Ads', 'PrestaShop']

      - name: campaign
        description: Marketing campaign name
        tests:
          - not_null

      - name: total_sessions
        description: Total sessions from GA4
        tests:
          - dbt_expectations.expect_column_values_to_be_non_negative:
              row_condition: "data_source = 'GA4'"

      - name: total_impressions
        description: Total ad impressions from Facebook Ads
        tests:
          - dbt_expectations.expect_column_values_to_be_non_negative:
              row_condition: "data_source = 'Facebook Ads'"

      - name: total_clicks
        description: Total clicks across all channels
        tests:
          - dbt_expectations.expect_column_values_to_be_non_negative

      - name: total_conversions
        description: Total conversions/purchases
        tests:
          - dbt_expectations.expect_column_values_to_be_non_negative

      - name: total_revenue
        description: Total revenue in account currency
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0

      - name: total_cost
        description: Total ad spend (0 for non-paid channels)
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0

      - name: roas
        description: Return on ad spend (Revenue / Cost)
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0

      - name: cpa
        description: Cost per acquisition (Cost / Conversions)
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0

      - name: conversion_rate_pct
        description: Conversion rate percentage (Conversions / Sessions * 100)
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 100

      - name: ctr_pct
        description: Click-through rate percentage (Clicks / Impressions * 100)
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 100

      - name: cpc
        description: Cost per click (Cost / Clicks)
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0

      - name: source_row_count
        description: Number of source records aggregated

      - name: first_loaded_at
        description: Timestamp of first data load for this record

      - name: last_loaded_at
        description: Timestamp of most recent data load

      - name: _dbt_loaded_at
        description: Timestamp when dbt created/updated this record
        tests:
          - not_null

    tests:
      - dbt_utils.recency:
          datepart: day
          field: date_day
          interval: 3
          meta:
            description: "Data should be no more than 3 days old"

      - dbt_utils.expression_is_true:
          expression: "total_revenue >= 0"
          meta:
            description: "Revenue should never be negative"

      - dbt_utils.expression_is_true:
          expression: "total_cost >= 0"
          meta:
            description: "Cost should never be negative"

      - dbt_utils.expression_is_true:
          expression: "total_sessions >= 0"
          meta:
            description: "Sessions should never be negative"
