version: 2

models:
  - name: fct_marketing_performance
    description: |
      Marketing performance fact table combining spend and revenue metrics across channels.
      Contains daily aggregated data by channel and campaign.

    tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 1
          config:
            severity: warn

    columns:
      - name: performance_sk
        description: "Surrogate key for the performance record"
        tests:
          - unique
          - not_null

      - name: date_day
        description: "Date of the performance data"
        tests:
          - not_null

      - name: channel_grouping
        description: "Marketing channel grouping"
        tests:
          - not_null

      - name: source
        description: "Traffic source"
        tests:
          - not_null

      - name: medium
        description: "Traffic medium"
        tests:
          - not_null

      - name: campaign
        description: "Campaign name"
        tests:
          - not_null

      - name: total_sessions
        description: "Total sessions"
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
              config:
                severity: warn

      - name: total_cost
        description: "Total cost - must be non-negative"
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
              config:
                severity: error

      - name: total_revenue
        description: "Total revenue - must be non-negative"
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
              config:
                severity: warn

      - name: roas
        description: "Return on Ad Spend"
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
              config:
                severity: warn
