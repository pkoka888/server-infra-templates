marketing_analytics:
  target: dev
  outputs:
    dev:
      type: postgres
      host: metabase-db
      port: 5432
      user: metabase
      password: "{{ env_var('POSTGRES_PASSWORD') }}"
      database: metabase
      schema: staging
      threads: 4
    
    prod:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'metabase-db') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      user: "{{ env_var('POSTGRES_USER', 'metabase') }}"
      password: "{{ env_var('POSTGRES_PASSWORD') }}"
      database: "{{ env_var('POSTGRES_DATABASE', 'metabase') }}"
      schema: staging
      threads: 8
      keepalives_idle: 60
      connect_timeout: 30
