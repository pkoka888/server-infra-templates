---
# Common role template - copy to roles/{role_name}/tasks/main.yml

- name: Ensure package is installed
  ansible.builtin.package:
    name: "{{ role_package | default('nginx') }}"
    state: present

- name: Configure application
  ansible.builtin.template:
    src: templates/config.conf.j2
    dest: /etc/{{ role_name | default('myapp') }}/config.conf
    mode: '0644'
  notify: Restart service
  when: role_config_enabled | default(true)

- name: Ensure service is running
  ansible.builtin.service:
    name: "{{ role_service | default('nginx') }}"
    state: started
    enabled: true