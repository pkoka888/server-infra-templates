---
# Ansible Playbook: Rotate API Secrets

- name: Rotate API Secrets
  hosts: metabase_servers
  become: false
  vars_files:
    - group_vars/all/vault.yml

  tasks:
    - name: Check current expiry dates
      ansible.builtin.shell:
        cmd: |
          # Log rotation request
          echo "Secret rotation requested at $(date)"
      register: rotation_log

    - name: Generate new GA4 refresh token
      when: rotate_ga4 | default(false)
      block:
        - name: Request GA4 token refresh
          ansible.builtin.shell:
            cmd: |
              # OAuth2 token refresh workflow
              curl -X POST https://oauth2.googleapis.com/token \
                -d "client_id={{ vault_client1_ga4_client_id }}" \
                -d "client_secret={{ vault_client1_ga4_client_secret }}" \
                -d "refresh_token={{ vault_client1_ga4_refresh_token }}" \
                -d "grant_type=refresh_token"
          register: ga4_token

        - name: Update vault with new token
          ansible.builtin.debug:
            msg: "Update vault_client1_ga4_refresh_token with new value from OAuth flow"

    - name: Generate new Facebook access token
      when: rotate_fb | default(false)
      block:
        - name: Request FB token refresh
          ansible.builtin.debug:
            msg: "Manual Facebook token refresh required via Graph API Explorer"

    - name: Generate new PrestaShop API key
      when: rotate_prestashop | default(false)
      block:
        - name: Generate secure API key
          ansible.builtin.shell:
            cmd: python3 -c "import secrets; print(secrets.token_urlsafe(32))"
          register: new_ps_key

        - name: Update PrestaShop via API
          ansible.builtin.debug:
            msg: "Update PrestaShop API key via admin panel and vault"

    - name: Log rotation completion
      ansible.builtin.debug:
        msg: "Secret rotation completed. Remember to update vault.yml with ansible-vault."
