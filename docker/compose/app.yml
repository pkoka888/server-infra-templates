---
# Docker Compose Template - Production Ready
# Copy to project and customize variables

version: '3.8'

services:
  app:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAME:-myapp}:${IMAGE_TAG:-latest}
    container_name: ${PROJECT_NAME:-myproject}-app-1
    restart: unless-stopped
    
    # Security - REQUIRED
    security_opt:
      - no-new-privileges:true
    user: "${APP_USER:-appuser}:${APP_GROUP:-appgroup}"
    
    # Healthcheck - REQUIRED
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${HEALTH_PORT:-8080}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    
    # Logging - REQUIRED
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    
    # Resource limits - REQUIRED
    deploy:
      resources:
        limits:
          memory: ${MEMORY_LIMIT:-512M}
          cpus: '${CPU_LIMIT:-0.5}'
        reservations:
          memory: 256M
          cpus: 0.25
    
    environment:
      - APP_ENV=${APP_ENV:-production}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    
    env_file:
      - .env
    
    networks:
      - app_network
    
    ports:
      - "${HOST_PORT:-8080}:${CONTAINER_PORT:-8080}"
    
    volumes:
      - app_data:/app/data

  db:
    image: postgres:17-alpine
    container_name: ${PROJECT_NAME:-myproject}-db-1
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - POSTGRES_DB=${DB_NAME:-app}
      - POSTGRES_USER=${DB_USER:-appuser}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-appuser}"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  app_network:
    name: ${PROJECT_NAME:-myproject}_network

volumes:
  app_data:
  db_data: